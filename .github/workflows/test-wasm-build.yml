# WASM 构建测试工作流 - 收集日志和警告

name: Test WASM Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - phase5-browser-lifecycle-20260325
    paths:
      - 'CMakeLists.txt'
      - 'src/**'
      - 'docs/examples/**'
      - 'tests/**'
      - '.github/workflows/test-wasm-build.yml'

jobs:
  test-wasm-build:
    name: Test WASM Build with Logging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install wabt tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: Configure WASM build
        run: |
          set -euo pipefail
          echo "=== CMake Configuration ==="
          emcmake cmake -S . -B build_wasm -DSPZ2GLB_BUILD_WASM=ON -DSPZ2GLB_USE_EMSCRIPTEN_ZLIB=ON 2>&1 | tee cmake.log

      - name: Build spz2glb WASM (verbose)
        run: |
          set -euo pipefail
          echo "=== WASM Build Output ==="
          emmake cmake --build build_wasm --config Release --target spz2glb-wasm --verbose 2>&1 | tee build.log
          echo ""
          echo "=== Build Warnings/Errors Summary ==="
          grep -iE "(warning|error)" build.log | head -20 || echo "No warnings/errors found"

      - name: Locate WASM artifacts
        run: |
          echo "=== Locate WASM Artifacts ==="
          echo "[debug] candidate wasm files:"
          find . -type f -name '*.wasm' | sort || true

          WASM_FILE=$(find . -type f -name '*.wasm' | grep -E 'spz2glb(-wasm)?\.wasm$|spz2glb\.wasm$' | head -n 1 || true)
          if [ -z "$WASM_FILE" ]; then
            WASM_FILE=$(find . -type f -name '*spz2glb*.wasm' | head -n 1 || true)
          fi

          if [ -z "$WASM_FILE" ]; then
            echo "❌ spz2glb wasm artifact not found"
            echo "[debug] dist dirs:"
            find . -type d -name dist -print || true
            echo "[debug] build_wasm tree (depth 3):"
            find build_wasm -maxdepth 3 -print || true
            exit 1
          fi

          WASM_DIR=$(dirname "$WASM_FILE")
          echo "WASM_FILE=$WASM_FILE" >> "$GITHUB_ENV"
          echo "WASM_DIR=$WASM_DIR" >> "$GITHUB_ENV"

          mkdir -p dist

          copy_if_needed() {
            local src="$1"
            local dst="$2"
            local src_abs dst_abs
            src_abs=$(readlink -f "$src")
            dst_abs=$(readlink -f "$dst" 2>/dev/null || true)
            if [ -n "$dst_abs" ] && [ "$src_abs" = "$dst_abs" ]; then
              echo "[debug] skip copy (same file): $src -> $dst"
              return 0
            fi
            cp "$src" "$dst"
          }

          copy_if_needed "$WASM_FILE" dist/spz2glb.wasm

          JS_CANDIDATE=$(find "$WASM_DIR" -maxdepth 1 -type f -name '*spz2glb*.js' | head -n 1 || true)
          if [ -n "$JS_CANDIDATE" ]; then
            copy_if_needed "$JS_CANDIDATE" dist/spz2glb.js
          fi

          DATA_CANDIDATE=$(find "$WASM_DIR" -maxdepth 1 -type f -name '*spz2glb*.data' | head -n 1 || true)
          if [ -n "$DATA_CANDIDATE" ]; then
            copy_if_needed "$DATA_CANDIDATE" dist/spz2glb.data
          fi

          ls -la "$WASM_DIR"
          ls -la dist/

      - name: Analyze WASM imports/exports
        run: |
          echo "=== WASM File Info ==="
          ls -la dist/

          echo ""
          echo "=== WASM Full Analysis (wasm-objdump) ==="
          wasm-objdump -x dist/spz2glb.wasm 2>/dev/null | tee wasm_analysis.txt || echo "wasm-objdump failed"

          echo ""
          echo "=== Import Section ==="
          grep -A 20 "Import" wasm_analysis.txt | head -25 || echo "No imports found"

          echo ""
          echo "=== Export Section ==="
          grep -A 30 "Export" wasm_analysis.txt | head -35 || echo "No exports found"

          echo ""
          echo "=== Memory Section ==="
          grep -A 5 "Memory" wasm_analysis.txt | head -10 || echo "No memory section found"

      - name: Test browser glue loading
        run: |
          set -euo pipefail
          echo "=== Testing browser glue loading ==="
          test -f dist/spz2glb.js
          test -f dist/spz2glb.wasm

          cat > smoke.html << 'EOF'
          <!doctype html>
          <html>
            <body>
              <script type="module">
                import createSpz2glbModule from './dist/spz2glb.js';

                window.__smokeResult = { status: 'pending' };

                try {
                  const module = await createSpz2glbModule({
                    locateFile(path) {
                      return path.endsWith('.wasm') ? './dist/spz2glb.wasm' : path;
                    },
                    print() {},
                    printErr(text) {
                      console.error(text);
                    },
                  });

                  const ptr = module._spz2glb_alloc(12);
                  module._spz2glb_get_version(ptr, ptr + 4, ptr + 8);
                  const heapU32 = new Uint32Array(module.HEAPU8.buffer);
                  const version = `${heapU32[ptr / 4]}.${heapU32[ptr / 4 + 1]}.${heapU32[ptr / 4 + 2]}`;
                  module._spz2glb_free(ptr);

                  window.__smokeResult = {
                    status: 'ok',
                    version,
                    exports: Object.keys(module).filter((key) => key.startsWith('_')).slice(0, 10),
                  };
                } catch (error) {
                  window.__smokeResult = {
                    status: 'error',
                    message: error?.message ?? String(error),
                    stack: error?.stack ?? '',
                  };
                  console.error(error);
                }
              </script>
            </body>
          </html>
          EOF

          python3 -m http.server 8000 > browser_server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT

          npm install --no-save playwright@1.53.0
          npx playwright install --with-deps chromium
          node << 'EOF' | tee browser_smoke.log
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            page.on('console', (msg) => console.log(`[browser:${msg.type()}] ${msg.text()}`));
            page.on('pageerror', (err) => console.error('[pageerror]', err.stack || err.message));

            await page.goto('http://127.0.0.1:8000/smoke.html', { waitUntil: 'load' });
            await page.waitForFunction(
              () => window.__smokeResult && window.__smokeResult.status !== 'pending',
              null,
              { timeout: 30000 }
            );

            const result = await page.evaluate(() => window.__smokeResult);
            console.log(JSON.stringify(result));
            await browser.close();

            if (result.status !== 'ok') {
              console.error(result.stack || result.message || 'browser glue smoke failed');
              process.exit(1);
            }
          })().catch((error) => {
            console.error(error.stack || error.message);
            process.exit(1);
          });
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: wasm-build-logs
          path: |
            cmake.log
            build.log
            wasm_analysis.txt
            smoke.html
            browser_server.log
            browser_smoke.log
            dist/
            build_wasm/dist/
