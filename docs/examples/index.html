<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPZ → GLB 在线转换器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-radius: 16px;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 560px; }
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 48px 40px;
        }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .header p { color: var(--text-secondary); font-size: 16px; }

        .drop-zone {
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .drop-zone:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .drop-zone input { display: none; }
        .drop-icon { font-size: 48px; margin-bottom: 16px; }
        .drop-text { font-size: 16px; color: var(--text-primary); margin-bottom: 4px; }
        .drop-hint { font-size: 13px; color: var(--text-secondary); }
        .file-info {
            margin-top: 16px;
            padding: 12px;
            background: #f3f4f6;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status {
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
        .status.loading { background: #fef3c7; color: var(--warning); }
        .status.success { background: #d1fae5; color: var(--success); }
        .status.error { background: #fee2e2; color: var(--error); }
        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }
        button:hover:not(:disabled) { background: var(--primary-dark); }
        button:disabled { background: #d1d5db; cursor: not-allowed; }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .stat {
            background: #f3f4f6;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .stat-value { font-size: 16px; font-weight: 600; color: var(--primary); }
        .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🌀 SPZ → GLB</h1>
                <p>高性能 WebAssembly 在线转换</p>
            </div>

            <div class="drop-zone" id="dropZone">
                <input type="file" id="fileInput" accept=".spz">
                <div class="drop-icon">📁</div>
                <div class="drop-text">点击或拖拽上传 SPZ 文件</div>
                <div class="drop-hint">支持 .spz 格式</div>
            </div>

            <div class="file-info" id="fileInfo"></div>

            <div class="status" id="statusBox"></div>

            <div class="stats" id="statsBox" style="display:none;">
                <div class="stat">
                    <div class="stat-value" id="statTime">-</div>
                    <div class="stat-label">耗时 (ms)</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statInput">-</div>
                    <div class="stat-label">输入大小</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statOutput">-</div>
                    <div class="stat-label">输出大小</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statCurrent">-</div>
                    <div class="stat-label">当前内存</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statPeak">-</div>
                    <div class="stat-label">峰值内存</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statAllocs">-</div>
                    <div class="stat-label">分配次数</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statFails">-</div>
                    <div class="stat-label">失败次数</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statWorkUsed">-</div>
                    <div class="stat-label">工作区占用</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statWorkCapacity">-</div>
                    <div class="stat-label">工作区容量</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statWorkPeak">-</div>
                    <div class="stat-label">工作区峰值</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statHotAvailable">-</div>
                    <div class="stat-label">热池剩余</div>
                </div>
            </div>

            <button id="convertBtn" disabled>选择文件后点击转换</button>
        </div>
    </div>

    <script type="module">
        import { loadSpz2Glb } from './spz2glb_bindings.js';
        import SmartMemoryManager from './smart_memory.js';

        let spz2glb = null;
        let selectedFile = null;
        let memManager = null;
        let isConverting = false;
        const testConfig = readTestConfig();
        window.__spz2glbTestState = testConfig.captureState ? createEmptyTestState() : null;

        function showStatus(msg, type) {
            const el = document.getElementById('statusBox');
            el.style.display = 'block';
            el.className = 'status ' + type;
            el.innerHTML = msg;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        function formatRecommendation(recommendation) {
            return `推荐 ≤ ${recommendation.recommendedMaxSize}MB | 硬上限 ${recommendation.hardMaxSize}MB`;
        }

        function setStat(id, value) {
            document.getElementById(id).textContent = value;
        }

        function readTestConfig() {
            const params = new URLSearchParams(window.location.search);
            const rawChunkSize = params.get('chunkSize');
            if (rawChunkSize === null) {
                return { chunkSize: null, captureState: false };
            }

            const chunkSize = Number.parseInt(rawChunkSize, 10);
            if (!Number.isFinite(chunkSize) || chunkSize <= 0) {
                throw new Error(`Invalid chunkSize query parameter: ${rawChunkSize}`);
            }

            return { chunkSize, captureState: true };
        }

        function createEmptyTestState(inputSize = 0) {
            return {
                inputSize,
                outputSize: 0,
                blobSize: 0,
                chunkSize: testConfig.chunkSize,
                chunkWrites: [],
                operations: [],
            };
        }

        function getTestState() {
            return window.__spz2glbTestState;
        }

        function resetTestState(inputSize = 0) {
            if (!testConfig.captureState) {
                return;
            }
            window.__spz2glbTestState = createEmptyTestState(inputSize);
        }

        function updateTestState(patch) {
            const state = getTestState();
            if (!state) {
                return;
            }
            Object.assign(state, patch);
        }

        function recordTestOperation(name, detail = {}) {
            const state = getTestState();
            if (!state) {
                return;
            }
            state.operations.push({ name, ...detail });
        }

        function recordChunkWrite(chunk) {
            const state = getTestState();
            if (!state) {
                return;
            }
            state.chunkWrites.push(chunk);
        }

        function getConvertFileOptions() {
            if (testConfig.chunkSize == null) {
                return undefined;
            }
            return {
                chunkSize: testConfig.chunkSize,
                onChunk: recordChunkWrite,
            };
        }

        function setFileSelectionEnabled(enabled) {
            fileInput.disabled = !enabled;
            dropZone.style.pointerEvents = enabled ? 'auto' : 'none';
            dropZone.style.opacity = enabled ? '1' : '0.7';
        }

        function downloadGlbResult(glbResult, fileName) {
            const bytesView = glbResult.getBytesView();
            recordTestOperation('output-view-read', { viewSize: bytesView.byteLength });

            const blob = new Blob([bytesView], { type: 'application/octet-stream' });
            updateTestState({ blobSize: blob.size });
            recordTestOperation('output-blob-created', { blobSize: blob.size });

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName.replace(/\.spz$/i, '.glb');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            recordTestOperation('download-started', { downloadName: a.download });
        }

        function renderConversionStats(file, glbResult, elapsedMs, memoryStats) {
            setStat('statTime', elapsedMs.toFixed(0));
            setStat('statInput', formatSize(file.size));
            setStat('statOutput', formatSize(glbResult.size));
            setStat('statCurrent', formatSize(memoryStats.currentUsageBytes));
            setStat('statPeak', formatSize(memoryStats.peakUsageBytes));
            setStat('statAllocs', String(memoryStats.totalAllocations));
            setStat('statFails', String(memoryStats.failedAllocations));
            setStat('statWorkUsed', formatSize(memoryStats.workUsed));
            setStat('statWorkCapacity', formatSize(memoryStats.workCapacity));
            setStat('statWorkPeak', formatSize(memoryStats.workPeak));
            setStat('statHotAvailable', String(memoryStats.hotAvailable));
            document.getElementById('statsBox').style.display = 'grid';
        }

        async function validateSelectedFile(file) {
            if (!spz2glb) {
                return { ok: false, message: 'WASM 模块尚未加载完成' };
            }

            const headerBytes = new Uint8Array(await file.slice(0, 64 * 1024).arrayBuffer());
            if (!spz2glb.validateSpzHeader(headerBytes)) {
                return { ok: false, message: 'SPZ 头部预检失败，请确认文件未损坏且格式正确' };
            }

            return { ok: true, message: 'SPZ 头部预检通过' };
        }

        async function init() {
            memManager = new SmartMemoryManager();
            const info = memManager.getInfo();

            const deviceIcon = info.device.isMobile ? '📱' : '💻';
            const tierLabel = { low: '低端', medium: '中端', high: '高端' }[info.device.tier];

            showStatus(`<span class="loading-spinner"></span>正在加载 WASM 模块...<br>
                <small style="opacity:0.7">${deviceIcon} ${info.device.type} (${tierLabel}) | 内存限制: ${info.memoryLimit}MB | 推荐: ≤${info.recommendedMaxFileSize}MB | 硬上限: ${info.hardMaxFileSize}MB</small>`, 'loading');

            try {
                const memConfig = memManager.getWasmMemoryConfig();
                spz2glb = await loadSpz2Glb('./spz2glb.wasm', { memory: memConfig.memory });
                showStatus(`✅ WASM 模块加载成功！版本: ${spz2glb.getVersion()}<br>
                    <small style="opacity:0.7">建议文件大小 ≤ ${info.recommendedMaxFileSize}MB，硬上限 ${info.hardMaxFileSize}MB</small>`, 'success');
                if (selectedFile) {
                    await handleFile(selectedFile);
                }
                setTimeout(() => document.getElementById('statusBox').style.display = 'none', 3000);
            } catch (err) {
                showStatus('❌ WASM 加载失败: ' + err.message, 'error');
            }
        }

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const convertBtn = document.getElementById('convertBtn');

        dropZone.addEventListener('click', () => {
            if (!isConverting) {
                fileInput.click();
            }
        });
        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            if (!isConverting) {
                dropZone.style.borderColor = 'var(--primary)';
            }
        });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#d1d5db'; });
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.style.borderColor = '#d1d5db';
            if (isConverting) {
                return;
            }
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.spz')) handleFile(file);
        });
        fileInput.addEventListener('change', () => {
            if (isConverting) {
                return;
            }
            const file = fileInput.files[0];
            if (file) handleFile(file);
        });

        async function handleFile(file) {
            const recommendation = memManager.getRecommendation(file.size / (1024 * 1024));
            selectedFile = file;
            fileInfo.style.display = 'block';

            const validation = await validateSelectedFile(file);
            if (!validation.ok) {
                fileInfo.innerHTML = `<strong>${file.name}</strong> (${formatSize(file.size)})<br>
                    <span style="color:var(--error)">✖ ${validation.message}</span><br>
                    <small style="opacity:0.7">${formatRecommendation(recommendation)}</small>`;
                convertBtn.disabled = true;
                convertBtn.textContent = '文件头校验失败';
                return;
            }

            if (recommendation.state === 'standard') {
                fileInfo.innerHTML = `<strong>${file.name}</strong> (${formatSize(file.size)})<br>
                    <small style="opacity:0.7">${validation.message} | ${formatRecommendation(recommendation)}</small>`;
                convertBtn.disabled = false;
                convertBtn.textContent = '转换 ' + file.name;
                return;
            }

            if (recommendation.state === 'light') {
                fileInfo.innerHTML = `<strong>${file.name}</strong> (${formatSize(file.size)})<br>
                    <span style="color:var(--warning)">⚠️ ${recommendation.message}</span><br>
                    <small style="opacity:0.7">${validation.message} | ${formatRecommendation(recommendation)} | CLI: ${recommendation.cliCommand}</small>`;
                convertBtn.disabled = false;
                convertBtn.textContent = '继续转换（接近上限）';
                return;
            }

            fileInfo.innerHTML = `<strong>${file.name}</strong> (${formatSize(file.size)})<br>
                <span style="color:var(--error)">✖ ${recommendation.message}</span><br>
                <small style="opacity:0.7">${validation.message} | ${formatRecommendation(recommendation)} | CLI: ${recommendation.cliCommand}</small>`;
            convertBtn.disabled = true;
            convertBtn.textContent = '文件超出浏览器上限';
        }

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile || !spz2glb || isConverting) return;

            const file = selectedFile;
            const convertOptions = getConvertFileOptions();
            const chunkSize = convertOptions?.chunkSize ?? 1024 * 1024;
            const recommendation = memManager.getRecommendation(file.size / (1024 * 1024));
            if (!recommendation.allowConversion) {
                showStatus(`❌ ${recommendation.message}<br><small style="opacity:0.7">命令行: ${recommendation.cliCommand}</small>`, 'error');
                return;
            }

            const validation = await validateSelectedFile(file);
            if (!validation.ok) {
                showStatus(`❌ ${validation.message}`, 'error');
                convertBtn.disabled = true;
                convertBtn.textContent = '文件头校验失败';
                return;
            }

            isConverting = true;
            setFileSelectionEnabled(false);
            convertBtn.disabled = true;
            convertBtn.innerHTML = '<span class="loading-spinner"></span>转换中...';
            document.getElementById('statsBox').style.display = 'none';
            spz2glb.resetMemoryStats();

            const startTime = performance.now();
            showStatus('<span class="loading-spinner"></span>正在分块写入 WASM 并转换...', 'loading');

            let glbResult = null;
            resetTestState(file.size);
            recordTestOperation('conversion-start', { chunkSize, fileName: file.name });
            try {
                glbResult = await spz2glb.convertFile(file, convertOptions);
                if (!glbResult) throw new Error('转换失败');

                updateTestState({ outputSize: glbResult.size });
                recordTestOperation('conversion-finished', { outputSize: glbResult.size });

                const endTime = performance.now();
                const memoryStats = spz2glb.getMemoryStats();
                recordTestOperation('memory-stats-read', {
                    currentUsageBytes: memoryStats.currentUsageBytes,
                    peakUsageBytes: memoryStats.peakUsageBytes,
                });
                renderConversionStats(file, glbResult, endTime - startTime, memoryStats);

                downloadGlbResult(glbResult, file.name);
                showStatus('✅ 转换成功！', 'success');
            } catch (err) {
                recordTestOperation('conversion-error', { message: err.message });
                showStatus('❌ 错误: ' + err.message, 'error');
            } finally {
                if (glbResult) {
                    glbResult.release();
                    recordTestOperation('output-released');
                    if (testConfig.captureState) {
                        try {
                            glbResult.getBytesView();
                            recordTestOperation('post-release-view-read-unexpected');
                        } catch (releaseError) {
                            recordTestOperation('post-release-view-error', { message: releaseError.message });
                        }
                    }
                }
                isConverting = false;
                setFileSelectionEnabled(true);
                await handleFile(file);
            }

        });

        init();
    </script>
</body>
</html>
